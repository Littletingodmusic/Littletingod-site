<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Little Tin God</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    section {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      transition: all 1s ease;
    }

    h1 {
      font-size: 42px;
      letter-spacing: 6px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
      font-size: 14px;
      letter-spacing: 2px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 24px;
      text-decoration: none;
      border: 1px solid white;
      color: white;
      font-size: 12px;
      letter-spacing: 2px;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    .kdyw {
      background: radial-gradient(circle at center, #ff6a00 0%, black 70%);
    }

    .kdyw p {
      color: #ffb38a;
    }

    .kdyw .btn {
      border-color: #ff6a00;
      color: #ff6a00;
    }

    .kdyw .btn:hover {
      background: #ff6a00;
      color: black;
    }

    .jericho {
      background: radial-gradient(circle at center, #0a3cff 0%, black 70%);
    }

    .jericho p {
      color: #9bbcff;
    }

    .jericho .btn {
      border-color: #0a3cff;
      color: #0a3cff;
    }

    .jericho .btn:hover {
      background: #0a3cff;
      color: black;
    }

    .transition {
      background: linear-gradient(black, #111);
    }

    .fade {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 1.5s forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <section>
    <h1 class="fade">LITTLE TIN GOD</h1>
    <p class="fade">a piece of me in every sound</p>
  </section>

  <section class="kdyw">
    <h1 class="fade">KDYW</h1>
    <p class="fade">something in me broke</p>
    <a class="btn fade" href="https://distrokid.com/hyperfollow/littletingod/knocking-down-your-walls" target="_blank">
      LISTEN
    </a>
  </section>

  <section class="jericho">
    <h1 class="fade">JERICHO</h1>
    <p class="fade">you can hear it now</p>
    <a class="btn fade" href="https://distrokid.com/hyperfollow/littletingod/jericho" target="_blank">
      ENTER
    </a>
  </section>

  <section class="transition">
    <p class="fade">not everyone hears it</p>
    <p class="fade">but some do</p>
  </section>

</body>
</html>
