<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Tin God</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#000;
color:white;
overflow-x:hidden;
}
.hero{
height:100vh;
background:url('tin-god.jpg') center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
position:relative;
text-align:center;
}
.overlay{
background:rgba(0,0,0,.72);
padding:40px;
border:1px solid rgba(255,140,0,.3);
backdrop-filter:blur(6px);
}
h1{
font-size:4rem;
letter-spacing:8px;
margin:0;
}
.tag{
margin-top:20px;
font-size:1.2rem;
opacity:.85;
letter-spacing:2px;
}
.signal{
margin-top:12px;
color:#ff9a3d;
letter-spacing:3px;
font-size:.9rem;
}
.section{
padding:90px 20px;
max-width:1100px;
margin:auto;
}
.track{
display:flex;
gap:24px;
align-items:center;
background:#111;
border:1px solid #222;
padding:20px;
margin-bottom:28px;
border-radius:18px;
box-shadow:0 0 30px rgba(255,120,0,.08);
}
.track img{
width:220px;
border-radius:12px;
}
.track-info{
flex:1;
}
.track h2{
margin:0 0 10px 0;
font-size:2rem;
}
.state{
color:#ff8a2d;
letter-spacing:2px;
font-size:.85rem;
margin-bottom:10px;
}
.desc{
opacity:.8;
margin-bottom:18px;
line-height:1.6;
}
audio{
width:100%;
}
footer{
text-align:center;
padding:50px 20px;
opacity:.6;
font-size:.9rem;
}
@media(max-width:800px){
.track{
flex-direction:column;
text-align:center;
}
.track img{
width:100%;
max-width:320px;
}
h1{
font-size:2.8rem;
}
}
</style>
</head>
<body>

<section class="hero">
<div class="overlay">
<h1>LITTLE TIN GOD</h1>
<div class="tag">a piece of me in every sound</div>
<div class="signal">ONE UNIVERSE • MANY STATES • ONE SIGNAL</div>
</div>
</section>

<section class="section">

<div class="track">
<img src="jericho-cover.jpg" alt="Jericho Cover">
<div class="track-info">
<div class="state">ASCENSION / REVELATION</div>
<h2>Jericho</h2>
<div class="desc">
The walls crack open. The signal gets louder.
</div>
<audio controls>
<source src="jericho-preview.mp3" type="audio/mpeg">
</audio>
</div>
</div>

<div class="track">
<img src="kdyw-cover.jpg" alt="KDYW Cover">
<div class="track-info">
<div class="state">FRACTURE / VULNERABILITY</div>
<h2>Knocking Down Your Walls</h2>
<div class="desc">
A confession from the ruins.
</div>
<audio controls>
<source src="kdyw-preview.mp3" type="audio/mpeg">
</audio>
</div>
</div>

</section>

<footer>
LITTLE TIN GOD • MODERN CRUSADER ROLLOUT
</footer>

</body>
</html>
