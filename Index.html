<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Tin God</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* HERO */
.hero {
    height: 100vh;
    background: url('tin-god.jpg') center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    animation: zoomHero 20s infinite alternate ease-in-out;
}

/* DARK OVERLAY */
.overlay {
    background: rgba(0,0,0,0.7);
    padding: 40px;
    text-align: center;
    animation: fadeIn 2s ease;
}

/* TITLE */
h1 {
    font-size: 3em;
    letter-spacing: 3px;
}

/* TEXT */
p {
    opacity: 0.85;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 15px 30px;
    border: 2px solid #ff6600;
    color: #ff6600;
    text-decoration: none;
    animation: pulseGlow 2.5s infinite;
    transition: 0.3s;
}

.btn:hover {
    background: #ff6600;
    color: black;
}

/* EMBERS */
.embers {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.ember {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #ff6600;
    border-radius: 50%;
    opacity: 0.7;
    animation: floatUp linear infinite;
}

/* SECTIONS */
.section {
    padding: 60px 20px;
    text-align: center;
    opacity: 0;
    transform: translateY(30px);
    transition: 1s;
}

.section.visible {
    opacity: 1;
    transform: translateY(0);
}

/* VIDEO */
iframe {
    width: 90%;
    max-width: 600px;
    height: 315px;
}

/* SOCIAL */
.socials a {
    margin: 10px;
    color: #ff6600;
    text-decoration: none;
}

/* CURSOR GLOW */
.cursor {
    position: fixed;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    pointer-events: none;
    background: rgba(255,100,0,0.4);
    mix-blend-mode: screen;
    z-index: 999;
}

/* ANIMATIONS */
@keyframes floatUp {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

@keyframes pulseGlow {
    0% { box-shadow: 0 0 5px #ff6600; }
    50% { box-shadow: 0 0 25px #ff6600; }
    100% { box-shadow: 0 0 5px #ff6600; }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes zoomHero {
    from { background-size: 100%; }
    to { background-size: 110%; }
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="hero">

    <div class="embers" id="embers"></div>

    <div class="overlay">
        <h1>LITTLE TIN GOD</h1>
        <p>A piece of me in every sound.<br>
        Different versions exist in different songs.</p>

        <a class="btn" href="https://distrokid.com/hyperfollow/littletingod/knocking-down-your-walls" target="_blank">
            STREAM NOW
        </a>
    </div>
</div>

<div class="section">
    <h2>WATCH</h2>
    <iframe src="https://www.youtube.com/embed/8m_jxnFYrIM"></iframe>
</div>

<div class="section">
    <h2>FOLLOW</h2>
    <div class="socials">
        <a href="https://www.tiktok.com/@little_tin_god">TikTok</a>
        <a href="https://youtube.com/@little_tin_god">YouTube</a>
        <a href="https://open.spotify.com/album/3m8wxGCpOksIZaEsLJAgJB">Spotify</a>
    </div>
</div>

<script>
/* EMBERS */
const container = document.getElementById("embers");

for (let i = 0; i < 50; i++) {
    let e = document.createElement("div");
    e.classList.add("ember");
    e.style.left = Math.random() * 100 + "vw";
    e.style.animationDuration = (3 + Math.random()*5) + "s";
    container.appendChild(e);
}

/* SCROLL ANIMATION */
const sections = document.querySelectorAll('.section');

window.addEventListener('scroll', () => {
    sections.forEach(sec => {
        const top = sec.getBoundingClientRect().top;
        if (top < window.innerHeight - 100) {
            sec.classList.add('visible');
        }
    });
});

/* CURSOR GLOW */
const cursor = document.getElementById('cursor');

document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
});
</script>

</body>
</html>
